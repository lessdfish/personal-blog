server:
  port: ${GATEWAY_PORT:${SERVER_PORT:18080}}

spring:
  application:
    name: blog-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8948}
    loadbalancer:
      cache:
        enabled: true
        caffeine:
          spec: initialCapacity=64,maximumSize=512,expireAfterWrite=30s
      retry:
        enabled: true
    gateway:
      httpclient:
        connect-timeout: 2000
        response-timeout: 5s
        pool:
          type: fixed
          max-connections: 300
          acquire-timeout: 3000
          max-idle-time: 30s
          max-life-time: 300s
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: ${gateway.routes.user-service-uri:lb://user-service}
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1

        - id: article-service
          uri: ${gateway.routes.article-service-uri:lb://article-service}
          predicates:
            - Path=/api/article/**
          filters:
            - StripPrefix=1

        - id: comment-service
          uri: ${gateway.routes.comment-service-uri:lb://comment-service}
          predicates:
            - Path=/api/comment/**
          filters:
            - StripPrefix=1

        - id: notify-service
          uri: ${gateway.routes.notify-service-uri:lb://notify-service}
          predicates:
            - Path=/api/notify/**
          filters:
            - StripPrefix=1

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}

logging:
  level:
    org.springframework.cloud.gateway: info
    org.springframework.cloud.loadbalancer: info
    com.bloggateway: info

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
