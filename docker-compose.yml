services:
  redis:
    image: redis:7
    container_name: blog-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: blog-rabbitmq
    ports:
      - "${RABBITMQ_HOST_PORT:-35672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: blog-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "${NACOS_HTTP_PORT:-8948}:8848"
      - "${NACOS_GRPC_PORT:-9948}:9848"
      - "${NACOS_RAFT_PORT:-9949}:9849"

  k6:
    image: grafana/k6:latest
    container_name: blog-k6
    profiles:
      - tools
    working_dir: /scripts
    volumes:
      - ./pressure-test:/scripts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint:
      - k6
